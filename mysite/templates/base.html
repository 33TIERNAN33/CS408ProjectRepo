{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CareTrack{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'hello/styles.css' %}" />
  </head>
  <body class="site-shell">
    <nav class="navbar navbar-expand-lg navbar-light navbar-green">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">CareTrack</a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{% url 'available_inventory' %}">Available Inventory</a>
          <a class="nav-link" href="{% url 'requested_items' %}">Requested Items</a>
          <a class="nav-link" href="{% url 'distributed_items' %}">Distributed Items</a>
          <a class="nav-link" href="/admin/">Staff Login</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer-green text-center py-3 mt-auto">
      <small>CareTrack | CS 408 Project | Tiernan Benner</small>
    </footer>
  </body>
</html>
